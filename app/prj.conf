# This file contains selected Kconfig options for the application.

CONFIG_CPP=y
CONFIG_REQUIRES_FULL_LIBCPP=y
CONFIG_STD_CPP20=y

CONFIG_GPIO=y
CONFIG_PWM=y
CONFIG_SMF=y
CONFIG_DISPLAY=y
CONFIG_LVGL=y

CONFIG_LV_FONT_MONTSERRAT_12=y
CONFIG_LV_FONT_MONTSERRAT_14=y
CONFIG_LV_FONT_MONTSERRAT_16=y
CONFIG_LV_FONT_MONTSERRAT_18=y
CONFIG_LV_FONT_MONTSERRAT_20=y
CONFIG_LV_FONT_MONTSERRAT_24=y


CONFIG_BT=y
CONFIG_BT_CTLR_TX_PWR_PLUS_4=y
CONFIG_BT_DEVICE_NAME="the eternal gambler"
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_GATT_CLIENT=y

CONFIG_BT_MAX_CONN=1
CONFIG_BT_MAX_PAIRED=1

# Single-link throughput tuning.
# 247-byte ATT payload is the practical max with 251-byte LL data length.
CONFIG_BT_L2CAP_TX_MTU=247
# BT_L2CAP_RX_MTU = CONFIG_BT_BUF_ACL_RX_SIZE - BT_L2CAP_HDR_SIZE
CONFIG_BT_BUF_ACL_RX_SIZE=251
CONFIG_BT_BUF_ACL_TX_SIZE=251

# Keep more packets in flight for notifications on the single BLE connection.
CONFIG_BT_ATT_TX_COUNT=16
CONFIG_BT_CONN_TX_MAX=16
CONFIG_BT_BUF_EVT_RX_COUNT=17
CONFIG_BT_BUF_ACL_TX_COUNT=16
CONFIG_BT_L2CAP_TX_BUF_COUNT=16

CONFIG_BT_USER_DATA_LEN_UPDATE=y
CONFIG_BT_USER_PHY_UPDATE=y
CONFIG_BT_CTLR_PHY_2M=y
CONFIG_BT_CTLR_DATA_LENGTH_MAX=251

CONFIG_LV_Z_MEM_POOL_SIZE=49152
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=1536